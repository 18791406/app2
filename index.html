<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reserva de Mesas</title>
  <style>
    :root {
      --bg: #2c3e50;
      --bg-2: #f4f4f9;
      --panel: #ffffff;
      --text: #1f2d3d;
      --muted: #7f8c8d;
      --available: #ecf0f1;
      --available-border: #bdc3c7;
      --selected: #3498db;
      --selected-border: #2980b9;
      --occupied: #e74c3c;
      --occupied-border: #c0392b;
      --success: #27ae60;
      --warning: #f1c40f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: var(--bg);
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    /* LOGIN */
    #login-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at top, #34495e, #2c3e50);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .login-card {
      background: white;
      padding: 40px;
      border-radius: 16px;
      text-align: center;
      width: 320px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.25);
      transform: translateY(0);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .login-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 55px rgba(0, 0, 0, 0.3);
    }

    .login-card input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #d7dde2;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .login-card input:focus {
      border-color: #3498db;
      box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.15);
    }

    .btn-login,
    #btn-reservar {
      width: 100%;
      padding: 12px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.15s ease, opacity 0.2s ease, background 0.2s ease;
    }

    .btn-login {
      background: #3498db;
      color: white;
    }

    .btn-login:hover,
    #btn-reservar:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    .btn-login:active,
    #btn-reservar:active:not(:disabled) {
      transform: translateY(1px) scale(0.99);
    }

    /* APP */
    #app-wrapper {
      display: none;
      height: 100vh;
      width: 100%;
      background-color: var(--bg-2);
    }

    .sidebar {
      width: 300px;
      background: linear-gradient(180deg, #2c3e50, #223041);
      color: white;
      padding: 25px;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      gap: 12px;
    }

    .sidebar h2 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .form-group {
      margin-bottom: 8px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #bdc3c7;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 11px 12px;
      border-radius: 8px;
      border: none;
      background: #ecf0f1;
      outline: none;
      transition: box-shadow 0.2s ease, transform 0.15s ease;
    }

    .form-group input:focus,
    .form-group select:focus {
      box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.18);
    }

    #mensaje-estado {
      margin: 8px 0 2px;
      min-height: 24px;
      color: var(--warning);
      font-size: 14px;
      line-height: 1.3;
    }

    #btn-reservar {
      background: var(--success);
      color: white;
      margin-top: 6px;
    }

    #btn-reservar:disabled {
      background: #7f8c8d;
      cursor: not-allowed;
      opacity: 0.8;
      transform: none;
    }

    .main-content {
      flex: 1;
      padding: 30px;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.85), rgba(233,236,239,1));
    }

    .floor-plan-container {
      flex: 1;
      background: white;
      border-radius: 18px;
      border: 2px dashed #d0d7de;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: auto;
      position: relative;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.02);
    }

    .floor-plan {
      display: grid;
      grid-template-columns: repeat(1, 150px) 100px repeat(1, 150px);
      grid-template-rows: repeat(3, 100px);
      gap: 30px 0;
      position: relative;
      padding: 25px;
    }

    .aisle {
      grid-column: 2;
      grid-row: 1 / span 3;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #bdc3c7;
      font-weight: bold;
      letter-spacing: 3px;
      border-left: 2px dashed #eef2f5;
      user-select: none;
    }

    .table {
      width: 140px;
      height: 80px;
      border-radius: 14px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: 700;
      cursor: pointer;
      position: relative;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.09);
      transition:
        transform 0.22s ease,
        box-shadow 0.22s ease,
        background 0.22s ease,
        border-color 0.22s ease,
        opacity 0.22s ease;
      user-select: none;
      overflow: hidden;
    }

    .table::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.18), transparent 45%);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .table:hover::after {
      opacity: 1;
    }

    .table:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.13);
    }

    .table.available {
      background: var(--available);
      border: 4px solid var(--available-border);
      color: #6c7a80;
    }

    .table.selected {
      background: linear-gradient(135deg, #4aa3df, #2f89c5);
      border: 4px solid var(--selected-border);
      color: white;
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 0 0 6px rgba(52, 152, 219, 0.15), 0 14px 28px rgba(41, 128, 185, 0.25);
      animation: pulse 1.1s ease-in-out infinite;
    }

    .table.occupied {
      background: linear-gradient(135deg, #f06b5c, #d94c3d);
      border: 4px solid var(--occupied-border);
      color: white;
      cursor: not-allowed;
      opacity: 0.9;
    }

    .table.occupied:hover {
      transform: none;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.09);
    }

    .table.reserved-flash {
      animation: reserveFlash 0.65s ease-out;
    }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(52, 152, 219, 0.35), 0 14px 28px rgba(41, 128, 185, 0.2); }
      70%  { box-shadow: 0 0 0 14px rgba(52, 152, 219, 0), 0 14px 28px rgba(41, 128, 185, 0.2); }
      100% { box-shadow: 0 0 0 0 rgba(52, 152, 219, 0), 0 14px 28px rgba(41, 128, 185, 0.2); }
    }

    @keyframes reserveFlash {
      0%   { transform: scale(1); }
      35%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    .t1 { grid-column: 1; grid-row: 1; }
    .t2 { grid-column: 1; grid-row: 2; }
    .t3 { grid-column: 1; grid-row: 3; }
    .t4 { grid-column: 3; grid-row: 1; }
    .t5 { grid-column: 3; grid-row: 2; }
    .t6 { grid-column: 3; grid-row: 3; }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      min-width: 260px;
      max-width: 360px;
      padding: 14px 16px;
      border-radius: 12px;
      color: white;
      background: rgba(44, 62, 80, 0.96);
      box-shadow: 0 16px 35px rgba(0, 0, 0, 0.22);
      transform: translateY(20px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      z-index: 1000;
      font-size: 14px;
      line-height: 1.35;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.success {
      background: rgba(39, 174, 96, 0.97);
    }

    .toast.error {
      background: rgba(231, 76, 60, 0.97);
    }

    @media (max-width: 900px) {
      #app-wrapper {
        flex-direction: column;
        overflow: auto;
      }

      .sidebar {
        width: 100%;
      }

      .floor-plan {
        transform: scale(0.92);
        transform-origin: center;
      }
    }
  </style>
</head>
<body>

  <div id="login-screen">
    <div class="login-card">
      <h2>Iniciar Sesión</h2>
      <input type="email" id="email" placeholder="Correo (ej@mail.com)">
      <input type="password" id="pass" placeholder="Contraseña (admin)">
      <button class="btn-login" onclick="validar()">Entrar</button>
      <p id="error" style="color: red; display: none; font-size: 13px; margin-top: 10px;">Datos incorrectos</p>
    </div>
  </div>

  <div id="app-wrapper">
    <aside class="sidebar">
      <h2>Reserva</h2>

      <div class="form-group">
        <label>Nombre:</label>
        <input type="text" id="nombre" placeholder="Tu nombre">
      </div>

      <div class="form-group">
        <label>Personas:</label>
        <select id="personas">
          <option>4 Personas</option>
          <option>6 Personas</option>
        </select>
      </div>

      <p id="mensaje-estado">Selecciona una mesa.</p>
      <button id="btn-reservar" disabled>Confirmar</button>
    </aside>

    <main class="main-content">
      <div class="floor-plan-container">
        <div class="floor-plan" id="floor-plan">
          <div class="aisle">PASILLO</div>
        </div>
      </div>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const mesas = [
      { id: 1, estado: 'available', pos: 't1' },
      { id: 2, estado: 'occupied',  pos: 't2' },
      { id: 3, estado: 'available', pos: 't3' },
      { id: 4, estado: 'available', pos: 't4' },
      { id: 5, estado: 'available', pos: 't5' },
      { id: 6, estado: 'occupied',  pos: 't6' }
    ];

    let sel = null;

    const loginScreen = document.getElementById('login-screen');
    const appWrapper = document.getElementById('app-wrapper');
    const floorPlan = document.getElementById('floor-plan');
    const btnReservar = document.getElementById('btn-reservar');
    const mensajeEstado = document.getElementById('mensaje-estado');
    const nombreInput = document.getElementById('nombre');
    const personasSelect = document.getElementById('personas');
    const toast = document.getElementById('toast');

    function showToast(text, type = '') {
      toast.textContent = text;
      toast.className = `toast ${type}`.trim();
      toast.classList.add('show');

      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => {
        toast.classList.remove('show');
      }, 2200);
    }

    function validar() {
      const mail = document.getElementById('email').value.trim();
      const password = document.getElementById('pass').value;

      if (mail.includes('@') && password === 'admin') {
        loginScreen.style.display = 'none';
        appWrapper.style.display = 'flex';
        render();
        showToast('Bienvenido. Ahora sí, a reservar mesas.', 'success');
      } else {
        document.getElementById('error').style.display = 'block';
      }
    }

    function actualizarEstadoUI() {
      const mesa = mesas.find(m => m.id === sel);

      if (!sel) {
        mensajeEstado.textContent = 'Selecciona una mesa.';
        btnReservar.disabled = true;
        return;
      }

      if (mesa && mesa.estado === 'available') {
        mensajeEstado.textContent = `Mesa ${mesa.id} lista para reservar.`;
        btnReservar.disabled = false;
      } else {
        mensajeEstado.textContent = 'Esa mesa no está disponible.';
        btnReservar.disabled = true;
      }
    }

    function reservarMesa() {
      const nombre = nombreInput.value.trim();
      const personas = personasSelect.value;

      if (!sel) {
        showToast('Selecciona una mesa primero.', 'error');
        return;
      }

      const mesa = mesas.find(m => m.id === sel);

      if (!mesa || mesa.estado !== 'available') {
        showToast('La mesa ya no está disponible.', 'error');
        btnReservar.disabled = true;
        return;
      }

      if (!nombre) {
        showToast('Escribe un nombre para la reserva.', 'error');
        nombreInput.focus();
        return;
      }

      mesa.estado = 'occupied';

      const mesaElement = document.querySelector(`.table.t${mesa.id}`);
      if (mesaElement) {
        mesaElement.classList.remove('selected');
        mesaElement.classList.add('reserved-flash');
        setTimeout(() => mesaElement.classList.remove('reserved-flash'), 700);
      }

      showToast(`Reserva confirmada: Mesa ${mesa.id} para ${nombre} (${personas}).`, 'success');

      sel = null;
      render();
      actualizarEstadoUI();
    }

    function render() {
      floorPlan.querySelectorAll('.table').forEach(m => m.remove());

      mesas.forEach(m => {
        const div = document.createElement('div');
        div.className = `table ${m.estado} ${m.pos} ${sel === m.id ? 'selected' : ''}`;
        div.innerHTML = `<span>Mesa ${m.id}</span>`;

        div.onclick = () => {
          if (m.estado === 'occupied') {
            showToast(`Mesa ${m.id} ocupada. El drama ya está servido.`, 'error');
            return;
          }

          sel = (sel === m.id) ? null : m.id;
          render();
          actualizarEstadoUI();

          if (sel) {
            showToast(`Mesa ${sel} seleccionada.`, 'success');
          }
        };

        floorPlan.appendChild(div);
      });

      actualizarEstadoUI();
    }

    btnReservar.addEventListener('click', reservarMesa);

    nombreInput.addEventListener('input', actualizarEstadoUI);
    personasSelect.addEventListener('change', actualizarEstadoUI);
  </script>
</body>
</html>
