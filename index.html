<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Mesas - Acceso Restringido</title>
    <style>
        /* --- ESTILOS DE LA PANTALLA DE LOGIN (NUEVO) --- */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #34495e 0%, #2c3e50 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            font-family: 'Segoe UI', sans-serif;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            width: 320px;
            text-align: center;
        }

        .login-card h1 { color: #2c3e50; margin-bottom: 20px; font-size: 24px; }
        
        .login-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #ecf0f1;
            border-radius: 6px;
            box-sizing: border-box;
            outline: none;
        }

        .login-input:focus { border-color: #3498db; }

        .btn-access {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-access:hover { background-color: #2980b9; }

        /* --- ESTILOS ORIGINALES DE TU APP --- */
        #app-wrapper {
            display: none; /* OCULTO POR DEFECTO */
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: none; /* Se activa por JS */
            height: 100vh;
            width: 100vw;
            background-color: #f4f4f9;
            overflow: hidden;
        }

        body { margin: 0; background-color: #2c3e50; }

        .sidebar {
            width: 300px;
            background-color: #2c3e50;
            color: white;
            padding: 25px;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            z-index: 10;
            flex-shrink: 0;
        }
        .sidebar h2 { margin-top: 0; border-bottom: 2px solid #34495e; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 14px; color: #bdc3c7; }
        .form-group input, .form-group select { width: 100%; padding: 10px; box-sizing: border-box; border: none; border-radius: 4px; background-color: #ecf0f1; color: #2c3e50; }
        
        button#btn-reservar { padding: 12px; background-color: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 20px; transition: 0.3s; }
        button#btn-reservar:disabled { background-color: #7f8c8d; cursor: not-allowed; }
        
        #mensaje-estado { margin-top: 15px; font-size: 14px; color: #f1c40f; min-height: 40px; }

        .main-content { flex: 1; padding: 30px; display: flex; flex-direction: column; background-color: #e9ecef; }
        .status-legend { display: flex; gap: 20px; margin-bottom: 20px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #333; }
        .dot { width: 16px; height: 16px; border-radius: 4px; }
        .dot.available { background-color: #ecf0f1; border: 2px solid #bdc3c7; }
        .dot.selected { background-color: #3498db; }
        .dot.occupied { background-color: #e74c3c; }

        .floor-plan-container { flex: 1; background-color: white; border-radius: 12px; border: 2px dashed #bdc3c7; padding: 40px; display: flex; justify-content: center; align-items: center; overflow: auto; }
        .floor-plan { display: grid; grid-template-columns: repeat(1, 150px) 100px repeat(1, 150px); grid-template-rows: repeat(3, 100px); gap: 30px 0; justify-items: center; align-items: center; }
        .aisle { grid-column: 2; grid-row: 1 / span 3; height: 100%; display: flex; justify-content: center; align-items: center; color: #bdc3c7; font-weight: bold; letter-spacing: 2px; border-left: 2px dashed #eee; border-right: 2px dashed #eee; }

        .table { width: 140px; height: 80px; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 18px; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: relative; }
        .table::before, .table::after { content: ''; position: absolute; width: 30px; height: 10px; background-color: #ccc; border-radius: 2px; }
        .table::before { top: -15px; left: 55px; } 
        .table::after { bottom: -15px; left: 55px; }

        .table.available { background-color: #ecf0f1; border: 4px solid #bdc3c7; color: #7f8c8d; }
        .table.selected { background-color: #3498db; border: 4px solid #2980b9; color: white; transform: scale(1.05); }
        .table.occupied { background-color: #e74c3c; border: 4px solid #c0392b; color: white; cursor: not-allowed; opacity: 0.7; }

        .t1 { grid-column: 1; grid-row: 1; } .t2 { grid-column: 1; grid-row: 2; } .t3 { grid-column: 1; grid-row: 3; }
        .t4 { grid-column: 3; grid-row: 1; } .t5 { grid-column: 3; grid-row: 2; } .t6 { grid-column: 3; grid-row: 3; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h1>Acceso al Sistema</h1>
            <input type="email" id="user-email" class="login-input" placeholder="Correo electrónico">
            <input type="password" id="user-pass" class="login-input" placeholder="Contraseña">
            <button class="btn-access" onclick="intentarLogin()">Entrar</button>
            <p id="error-login" style="color: #e74c3c; font-size: 12px; margin-top: 10px; display: none;">Credenciales incorrectas</p>
        </div>
    </div>

    <div id="app-wrapper" style="display: none; flex-direction: row;">
        <aside class="sidebar">
            <h2>Detalles de Reserva</h2>
            <div class="form-group">
                <label for="nombre">Nombre a reservar:</label>
                <input type="text" id="nombre" placeholder="Ej. Juan Pérez" autocomplete="off">
            </div>
            <div class="form-group">
                <label for="personas">Cantidad de personas:</label>
                <select id="personas">
                    <option value="4">4 Personas</option>
                    <option value="6">6 Personas</option>
                </select>
            </div>
            <div class="form-group">
                <label for="fecha">Fecha:</label>
                <input type="date" id="fecha">
            </div>
            <p id="mensaje-estado">Selecciona una mesa rectangular.</p>
            <button id="btn-reservar" disabled>Confirmar Reserva</button>
        </aside>

        <main class="main-content">
            <div class="status-legend">
                <div class="legend-item"><div class="dot available"></div> Disponible</div>
                <div class="legend-item"><div class="dot selected"></div> Tu Selección</div>
                <div class="legend-item"><div class="dot occupied"></div> Ocupada</div>
            </div>

            <div class="floor-plan-container">
                <div class="floor-plan" id="floor-plan">
                    <div class="aisle">PASILLO</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- LÓGICA DE LOGIN ---
        function intentarLogin() {
            const email = document.getElementById('user-email').value;
            const pass = document.getElementById('user-pass').value;
            const errorMsg = document.getElementById('error-login');

            // REGLA: Mail debe tener @ y pass debe ser 'admin'
            if (email.includes("@") && pass === "admin") {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app-wrapper').style.display = 'flex';
                renderizarMesas(); // Iniciamos la app después del login
            } else {
                errorMsg.style.display = 'block';
            }
        }

        // --- TU LÓGICA DE MESAS ---
        const mesas = [
            { id: 1, estado: 'available', clasePos: 't1' },
            { id: 2, estado: 'occupied',  clasePos: 't2' },
            { id: 3, estado: 'available', clasePos: 't3' },
            { id: 4, estado: 'available', clasePos: 't4' },
            { id: 5, estado: 'available', clasePos: 't5' },
            { id: 6, estado: 'occupied',  clasePos: 't6' }
        ];

        let mesaSeleccionada = null;
        const floorPlan = document.getElementById('floor-plan');
        const btnReservar = document.getElementById('btn-reservar');
        const mensajeEstado = document.getElementById('mensaje-estado');
        const inputNombre = document.getElementById('nombre');

        document.getElementById('fecha').valueAsDate = new Date();

        function renderizarMesas() {
            const mesasActuales = floorPlan.querySelectorAll('.table');
            mesasActuales.forEach(m => m.remove());

            mesas.forEach(mesa => {
                const mesaDiv = document.createElement('div');
                mesaDiv.classList.add('table', mesa.estado, mesa.clasePos);
                if (mesa.id === mesaSeleccionada) mesaDiv.classList.add('selected');

                mesaDiv.innerHTML = `<span>Mesa ${mesa.id}</span>`;

                mesaDiv.addEventListener('click', () => {
                    if (mesa.estado === 'occupied') return;
                    mesaSeleccionada = (mesaSeleccionada === mesa.id) ? null : mesa.id;
                    
                    if (mesaSeleccionada) {
                        mensajeEstado.innerText = `Mesa ${mesa.id} seleccionada.`;
                        mensajeEstado.style.color = "#2ecc71";
                        btnReservar.disabled = false;
                    } else {
                        mensajeEstado.innerText = "Selecciona una mesa rectangular.";
                        mensajeEstado.style.color = "#f1c40f";
                        btnReservar.disabled = true;
                    }
                    renderizarMesas();
                });
                floorPlan.appendChild(mesaDiv);
            });
        }

        btnReservar.addEventListener('click', () => {
            const nombre = inputNombre.value.trim();
            if (nombre === '') return alert('Ingresa un nombre.');

            const idx = mesas.findIndex(m => m.id === mesaSeleccionada);
            if (idx !== -1) {
                mesas[idx].estado = 'occupied';
                alert(`¡Éxito! Reserva a nombre de ${nombre}.`);
                mesaSeleccionada = null;
                inputNombre.value = '';
                btnReservar.disabled = true;
                mensajeEstado.innerText = "Selecciona una mesa.";
                renderizarMesas();
            }
        });
    </script>
</body>
</html>
