<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Mesas</title>
    <style>
        /* Estilos generales y Layout */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            height: 100vh;
            background-color: #f4f4f9;
            overflow: hidden; /* Evita scroll doble */
        }

        /* Menú lateral izquierdo */
        .sidebar {
            width: 300px;
            background-color: #2c3e50;
            color: white;
            padding: 25px;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            z-index: 10;
            flex-shrink: 0; /* No se encoge */
        }
        .sidebar h2 {
            margin-top: 0;
            border-bottom: 2px solid #34495e;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #bdc3c7;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: none;
            border-radius: 4px;
            background-color: #ecf0f1;
            color: #2c3e50;
        }
        button {
            padding: 12px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin-top: 20px;
            transition: background-color 0.3s;
        }
        button:disabled {
            background-color: #7f8c8d;
            cursor: not-allowed;
        }
        button:hover:not(:disabled) {
            background-color: #2ecc71;
        }
        #mensaje-estado {
            margin-top: 15px;
            font-size: 14px;
            color: #f1c40f;
            min-height: 40px;
        }

        /* Área principal - Representación gráfica */
        .main-content {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
            background-color: #e9ecef;
        }
        .status-legend {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            flex-shrink: 0;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #333;
        }
        .dot { width: 16px; height: 16px; border-radius: 4px; } /* Rectangulares pequeñas */
        .dot.available { background-color: #ecf0f1; border: 2px solid #bdc3c7; }
        .dot.selected { background-color: #3498db; }
        .dot.occupied { background-color: #e74c3c; }

        /* Contenedor del plano con scroll si es necesario */
        .floor-plan-container {
            flex: 1;
            background-color: white;
            border-radius: 12px;
            border: 2px dashed #bdc3c7;
            padding: 40px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.02);
            display: flex;
            justify-content: center; /* Centra la cuadrícula horizontalmente */
            align-items: center;     /* Centra la cuadrícula verticalmente */
            overflow: auto;
        }

        /* Plano de mesas usando CSS GRID para la organización 3x3 */
        .floor-plan {
            display: grid;
            /* Define 2 columnas principales con un pasillo ancho en medio */
            grid-template-columns: repeat(1, 150px) 100px repeat(1, 150px); 
            /* Define 3 filas */
            grid-template-rows: repeat(3, 100px);
            gap: 30px 0; /* Espacio vertical entre filas, 0 horizontal (usamos la columna pasillo) */
            justify-items: center;
            align-items: center;
        }

        /* Pasillo central virtual */
        .aisle {
            grid-column: 2;
            grid-row: 1 / span 3; /* Ocupa las 3 filas */
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #bdc3c7;
            font-weight: bold;
            letter-spacing: 2px;
            border-left: 2px dashed #eee;
            border-right: 2px dashed #eee;
        }

        /* Estilos de las mesas individuales RECTANGULARES */
        .table {
            width: 140px;  /* Más anchas */
            height: 80px;  /* Menos altas */
            border-radius: 8px; /* Esquinas ligeramente redondeadas */
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative;
        }

        /* Sillas decorativas para dar contexto de rectángulo */
        .table::before, .table::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 10px;
            background-color: #ccc;
            border-radius: 2px;
        }
        /* Sillas arriba y abajo */
        .table::before { top: -15px; left: 55px; } 
        .table::after { bottom: -15px; left: 55px; }

        .table.available {
            background-color: #ecf0f1;
            border: 4px solid #bdc3c7;
            color: #7f8c8d;
        }
        .table.available:hover {
            background-color: #e0e6e8;
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        .table.selected {
            background-color: #3498db;
            border: 4px solid #2980b9;
            color: white;
            transform: scale(1.05);
            box-shadow: 0 8px 15px rgba(52, 152, 219, 0.4);
        }
        .table.selected::before, .table.selected::after { background-color: #2980b9; }

        .table.occupied {
            background-color: #e74c3c;
            border: 4px solid #c0392b;
            color: white;
            cursor: not-allowed;
            opacity: 0.7;
        }
        .table.occupied::before, .table.occupied::after { background-color: #c0392b; }

        /* Posicionamiento específico de las mesas en la cuadrícula */
        /* Lado Izquierdo (Columna 1) */
        .t1 { grid-column: 1; grid-row: 1; }
        .t2 { grid-column: 1; grid-row: 2; }
        .t3 { grid-column: 1; grid-row: 3; }
        /* Lado Derecho (Columna 3) */
        .t4 { grid-column: 3; grid-row: 1; }
        .t5 { grid-column: 3; grid-row: 2; }
        .t6 { grid-column: 3; grid-row: 3; }

    </style>
</head>
<body>

    <aside class="sidebar">
        <h2>Detalles de Reserva</h2>
        <div class="form-group">
            <label for="nombre">Nombre a reservar:</label>
            <input type="text" id="nombre" placeholder="Ej. Juan Pérez" autocomplete="off">
        </div>
        <div class="form-group">
            <label for="personas">Cantidad de personas:</label>
            <select id="personas">
                <option value="4">4 Personas</option>
                <option value="6">6 Personas</option>
            </select>
        </div>
        <div class="form-group">
            <label for="fecha">Fecha:</label>
            <input type="date" id="fecha">
        </div>
        
        <p id="mensaje-estado">Selecciona una mesa rectangular.</p>
        
        <button id="btn-reservar" disabled>Confirmar Reserva</button>
    </aside>

    <main class="main-content">
        <div class="status-legend">
            <div class="legend-item"><div class="dot available"></div> Disponible</div>
            <div class="legend-item"><div class="dot selected"></div> Tu Selección</div>
            <div class="legend-item"><div class="dot occupied"></div> Ocupada</div>
        </div>

        <div class="floor-plan-container">
            <div class="floor-plan" id="floor-plan">
                <div class="aisle">PASILLO</div>
                </div>
        </div>
    </main>

    <script>
        // Configuración de 6 mesas
        const mesas = [
            // Lado Izquierdo
            { id: 1, estado: 'available', clasePos: 't1' },
            { id: 2, estado: 'occupied',  clasePos: 't2' },
            { id: 3, estado: 'available', clasePos: 't3' },
            // Lado Derecho
            { id: 4, estado: 'available', clasePos: 't4' },
            { id: 5, estado: 'available', clasePos: 't5' },
            { id: 6, estado: 'occupied',  clasePos: 't6' }
        ];

        let mesaSeleccionada = null;
        const floorPlan = document.getElementById('floor-plan');
        const btnReservar = document.getElementById('btn-reservar');
        const mensajeEstado = document.getElementById('mensaje-estado');
        const inputNombre = document.getElementById('nombre');

        // Establecer fecha de hoy por defecto
        document.getElementById('fecha').valueAsDate = new Date();

        function renderizarMesas() {
            // Eliminar mesas existentes pero mantener el pasillo
            const mesasActuales = floorPlan.querySelectorAll('.table');
            mesasActuales.forEach(m => m.remove());

            mesas.forEach(mesa => {
                const mesaDiv = document.createElement('div');
                // Añadimos clase 'table', clase de estado, y clase de posición grid
                mesaDiv.classList.add('table', mesa.estado, mesa.clasePos);
                
                if (mesa.id === mesaSeleccionada) {
                    mesaDiv.classList.add('selected');
                }

                mesaDiv.innerHTML = `<span>Mesa ${mesa.id}</span>`;

                mesaDiv.addEventListener('click', () => {
                    if (mesa.estado === 'occupied') return;

                    if (mesaSeleccionada === mesa.id) {
                        mesaSeleccionada = null;
                        mensajeEstado.innerText = "Selecciona una mesa rectangular.";
                        mensajeEstado.style.color = "#f1c40f";
                        btnReservar.disabled = true;
                    } else {
                        mesaSeleccionada = mesa.id;
                        mensajeEstado.innerText = `Mesa ${mesa.id} seleccionada (Lado ${mesa.clasePos.startsWith('t1') || mesa.clasePos.startsWith('t2') || mesa.clasePos.startsWith('t3') ? 'Izquierdo' : 'Derecho'}).`;
                        mensajeEstado.style.color = "#2ecc71";
                        btnReservar.disabled = false;
                    }
                    renderizarMesas();
                });

                floorPlan.appendChild(mesaDiv);
            });
        }

        btnReservar.addEventListener('click', () => {
            const nombre = inputNombre.value.trim();
            if (nombre === '') {
                alert('Por favor, ingresa un nombre.');
                return;
            }

            const mesaIndex = mesas.findIndex(m => m.id === mesaSeleccionada);
            if (mesaIndex !== -1) {
                mesas[mesaIndex].estado = 'occupied';
                alert(`¡Reserva éxito! Mesa ${mesaSeleccionada} a nombre de ${nombre}.`);
                
                mesaSeleccionada = null;
                inputNombre.value = '';
                btnReservar.disabled = true;
                mensajeEstado.innerText = "Selecciona una mesa.";
                mensajeEstado.style.color = "#f1c40f";
                
                renderizarMesas();
            }
        });

        renderizarMesas();
    </script>
</body>
</html>
