<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Mesas - Login</title>
    <style>
        /* --- ESTILOS DE LA PANTALLA DE LOGIN --- */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        .login-box h1 {
            color: #2c3e50;
            margin-bottom: 25px;
            font-family: 'Segoe UI', sans-serif;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-login:hover {
            background-color: #2980b9;
        }

        /* --- TU CÓDIGO ORIGINAL (Modificado para estar oculto al inicio) --- */
        #app-container {
            display: none; /* Oculto inicialmente */
            width: 100%;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            overflow: hidden;
        }

        /* Reutilización de tus estilos existentes */
        body { margin: 0; overflow: hidden; }
        
        .sidebar {
            width: 300px;
            background-color: #2c3e50;
            color: white;
            padding: 25px;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar h2 { margin-top: 0; border-bottom: 2px solid #34495e; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 14px; color: #bdc3c7; }
        .form-group input, .form-group select { width: 100%; padding: 10px; box-sizing: border-box; border: none; border-radius: 4px; background-color: #ecf0f1; color: #2c3e50; }
        
        button { padding: 12px; background-color: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 20px; transition: background-color 0.3s; }
        button:disabled { background-color: #7f8c8d; cursor: not-allowed; }
        button:hover:not(:disabled) { background-color: #2ecc71; }
        
        #mensaje-estado { margin-top: 15px; font-size: 14px; color: #f1c40f; min-height: 40px; }

        .main-content { flex: 1; padding: 30px; display: flex; flex-direction: column; background-color: #e9ecef; }
        .status-legend { display: flex; gap: 20px; margin-bottom: 20px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); flex-shrink: 0; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #333; }
        .dot { width: 16px; height: 16px; border-radius: 4px; }
        .dot.available { background-color: #ecf0f1; border: 2px solid #bdc3c7; }
        .dot.selected { background-color: #3498db; }
        .dot.occupied { background-color: #e74c3c; }

        .floor-plan-container { flex: 1; background-color: white; border-radius: 12px; border: 2px dashed #bdc3c7; padding: 40px; display: flex; justify-content: center; align-items: center; overflow: auto; }
        .floor-plan { display: grid; grid-template-columns: repeat(1, 150px) 100px repeat(1, 150px); grid-template-rows: repeat(3, 100px); gap: 30px 0; justify-items: center; align-items: center; }
        .aisle { grid-column: 2; grid-row: 1 / span 3; height: 100%; display: flex; justify-content: center; align-items: center; color: #bdc3c7; font-weight: bold; letter-spacing: 2px; border-left: 2px dashed #eee; border-right: 2px dashed #eee; }
        
        .table { width: 140px; height: 80px; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 18px; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: relative; }
        .table::before, .table::after { content: ''; position: absolute; width: 30px; height: 10px; background-color: #ccc; border-radius: 2px; }
        .table::before { top: -15px; left: 55px; } 
        .table::after { bottom: -15px; left: 55px; }

        .table.available { background-color: #ecf0f1; border: 4px solid #bdc3c7; color: #7f8c8d; }
        .table.selected { background-color: #3498db; border: 4px solid #2980b9; color: white; transform: scale(1.05); }
        .table.occupied { background-color: #e74c3c; border: 4px solid #c0392b; color: white; cursor: not-allowed; opacity: 0.7; }

        .t1 { grid-column: 1; grid-row: 1; }
        .t2 { grid-column: 1; grid-row: 2; }
        .t3 { grid-column: 1; grid-row: 3; }
        .t4 { grid-column: 3; grid-row: 1; }
        .t5 { grid-column: 3; grid-row: 2; }
        .t6 { grid-column: 3; grid-row: 3; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h1>App Reservas</h1>
            <input type="email" id="login-email" placeholder="Correo electrónico">
            <input type="password" id="login-pass" placeholder="Contraseña">
            <button class="btn-login" onclick="entrarALaApp()">Iniciar Sesión</button>
        </div>
    </div>

    <div id="app-container" style="display: none; flex-direction: row;">
        <aside class="sidebar">
            <h2>Detalles de Reserva</h2>
            <div class="form-group">
                <label for="nombre">Nombre a reservar:</label
