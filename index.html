<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Mesas</title>
    <style>
        /* Estilos base */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #2c3e50;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* --- PANTALLA DE LOGIN --- */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            width: 300px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .login-card input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        /* --- CONTENEDOR DE LA APP (OCULTO) --- */
        #app-wrapper {
            display: none; /* Se cambia a 'flex' por JS */
            height: 100vh;
            width: 100%;
            background-color: #f4f4f9;
        }

        /* Tu Sidebar original */
        .sidebar {
            width: 300px;
            background-color: #2c3e50;
            color: white;
            padding: 25px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 14px; color: #bdc3c7; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border-radius: 4px; border: none; background: #ecf0f1; box-sizing: border-box;}

        .main-content { flex: 1; padding: 30px; display: flex; flex-direction: column; background-color: #e9ecef; }
        
        /* Plano de mesas */
        .floor-plan-container { flex: 1; background: white; border-radius: 12px; border: 2px dashed #bdc3c7; display: flex; justify-content: center; align-items: center; overflow: auto; }
        .floor-plan { display: grid; grid-template-columns: repeat(1, 150px) 100px repeat(1, 150px); grid-template-rows: repeat(3, 100px); gap: 30px 0; }
        .aisle { grid-column: 2; grid-row: 1 / span 3; display: flex; justify-content: center; align-items: center; color: #bdc3c7; font-weight: bold; border-left: 2px dashed #eee; }

        .table { width: 140px; height: 80px; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-weight: bold; cursor: pointer; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .table.available { background: #ecf0f1; border: 4px solid #bdc3c7; color: #7f8c8d; }
        .table.selected { background: #3498db; border: 4px solid #2980b9; color: white; }
        .table.occupied { background: #e74c3c; border: 4px solid #c0392b; color: white; cursor: not-allowed; opacity: 0.7; }

        .t1 { grid-column: 1; grid-row: 1; } .t2 { grid-column: 1; grid-row: 2; } .t3 { grid-column: 1; grid-row: 3; }
        .t4 { grid-column: 3; grid-row: 1; } .t5 { grid-column: 3; grid-row: 2; } .t6 { grid-column: 3; grid-row: 3; }

        #btn-reservar { padding: 12px; background: #27ae60; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #btn-reservar:disabled { background: #7f8c8d; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2>Iniciar Sesión</h2>
            <input type="email" id="email" placeholder="Correo (ej@mail.com)">
            <input type="password" id="pass" placeholder="Contraseña (admin)">
            <button class="btn-login" onclick="validar()">Entrar</button>
            <p id="error" style="color: red; display: none; font-size: 13px; margin-top: 10px;">Datos incorrectos</p>
        </div>
    </div>

    <div id="app-wrapper">
        <aside class="sidebar">
            <h2>Reserva</h2>
            <div class="form-group">
                <label>Nombre:</label>
                <input type="text" id="nombre">
            </div>
            <div class="form-group">
                <label>Personas:</label>
                <select>
                    <option>4 Personas</option>
                    <option>6 Personas</option>
                </select>
            </div>
            <p id="mensaje-estado" style="color: #f1c40f;">Selecciona una mesa.</p>
            <button id="btn-reservar" disabled>Confirmar</button>
        </aside>

        <main class="main-content">
            <div class="floor-plan-container">
                <div class="floor-plan" id="floor-plan">
                    <div class="aisle">PASILLO</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function validar() {
            const mail = document.getElementById('email').value;
            const password = document.getElementById('pass').value;

            // Verificación simple
            if (mail.includes('@') && password === 'admin') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-wrapper').style.display = 'flex';
                render(); 
            } else {
                document.getElementById('error').style.display = 'block';
            }
        }

        const mesas = [
            { id: 1, estado: 'available', pos: 't1' },
            { id: 2, estado: 'occupied',  pos: 't2' },
            { id: 3, estado: 'available', pos: 't3' },
            { id: 4, estado: 'available', pos: 't4' },
            { id: 5, estado: 'available', pos: 't5' },
            { id: 6, estado: 'occupied',  pos: 't6' }
        ];

        let sel = null;

        function render() {
            const container = document.getElementById('floor-plan');
            container.querySelectorAll('.table').forEach(m => m.remove());

            mesas.forEach(m => {
                const div = document.createElement('div');
                div.className = `table ${m.estado} ${m.pos} ${sel === m.id ? 'selected' : ''}`;
                div.innerHTML = `<span>Mesa ${m.id}</span>`;
                
                div.onclick = () => {
                    if (m.estado === 'occupied') return;
                    sel = (sel === m.id) ? null : m.id;
                    document.getElementById('btn-reservar').disabled = !sel;
                    render();
                };
                container.appendChild(div);
            });
        }
    </script>
</body>
</html>
